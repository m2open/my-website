<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Homepage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f4f8;
            color: #333;
            text-align: center;
        }
        header {
            background: #0070f3;
            color: white;
            padding: 60px 20px;
        }
        h1 { font-size: 3rem; margin: 0; }
        p { font-size: 1.3rem; max-width: 600px; margin: 20px auto; }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: #ff4081;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
        .btn:hover { background: #e73370; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Website</h1>
        <p>This is a simple homepage hosted for free on Cloudflare Pages using GitHub.</p>
        <a href="#" class="btn">Get Started</a>
    </header>

    <section style="padding: 50px 20px;">
        <h2>About Me</h2>
        <p>I'm learning web development and this is my first deployed site!</p>
    </section>
</body>
</html>
